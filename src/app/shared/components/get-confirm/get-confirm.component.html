<h2 mat-dialog-title>Confirm Delete</h2>
<h3>Password is : 1</h3>

<mat-dialog-content>
  <p [innerHTML]="msg"></p>

  <mat-form-field appearance="outline" class="w-100">
    <mat-label class="text-white">Enter Password</mat-label>
    <input matInput type="password" [(ngModel)]="password" />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onClose(false)">Cancel</button>

  <button mat-raised-button color="warn" (click)="confirmDelete()">
    Delete
  </button>
</mat-dialog-actions>
